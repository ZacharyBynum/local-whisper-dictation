name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Local Whisper do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Hotkey and state machine
        - Audio capture
        - Transcription accuracy
        - Overlay UI
        - Tray integration
        - Installer and packaging
        - Documentation
        - Other
    validations:
      required: true
